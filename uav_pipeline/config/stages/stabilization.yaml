# enable: true

algorithm: # 当前选择
  type: feature_based
  detector: harris
  descriptor: orb
  matcher: bf
  motion_model: homography
  ransac_method: usac_magsac

detectors:
  harris:
    blockSize: 2 # Harris检测的邻域大小（默认2）
    ksize: 3 # Sobel算子核大小（默认3，必须为奇数）
    k: 0.04 # Harris响应值计算参数（默认0.04，范围0.04~0.06）
    harris_response_thresh: 0.08
    # harris_response_thresh_align: 0.07

  sift:
    n_features: 500
    contrast_threshold: 0.04
    edge_threshold: 10

descriptors:
  orb:
    n_features: 1000
    scale_factor: 1.2
    n_levels: 8
  sift:
    n_features: 500

matchers:
  bf:
    norm_type: hamming
    cross_check: false
    filter_ratio: 0.8

  flann:
    index_type: 1
    trees: 5
    filter_ratio: 0.75

motion_models:
  homography:
    ransac_reproj_thresh: 2.0
    ransac_max_iter: 5000
    ransac_confidence: 0.999999

param:
  downsample_ratio: 0.5


